name: Update job tracker
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch, filter, verify, rebuild page
        run: |
          python pipeline.py --live || echo "finished with warnings"
          python build_site.py
      - name: Commit updated listings and page
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/jobs.json docs/index.html
          git commit -m "Daily update" || echo "no changes"
          git push || echo "nothing to push"
